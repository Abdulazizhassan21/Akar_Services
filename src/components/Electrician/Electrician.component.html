<div class="parent">
  <div class="container">
    <div class="row">
      <div class="col-4 btn-emergency mt-5">Choose Painter </div>
      <div class="col-8"></div>

      <!-- Painter 1 -->
      <div class="col-4 mt-5">
        <div class="painter-grid">
          <div class="card">
            <img src="https://i.pravatar.cc/150?u=10" alt="Hany Mansour" class="avatar">
            <div class="info">
              <h3 class="name">Hany Mansour</h3>
              <p class="id">ID: 662031</p>
              <div class="rating">
                ★★★★<span class="empty">★</span>
              </div>
            </div>
            <button (click)="check(tasks()[0].id)" [ngClass]=" tasks()[0].completed ? 'btn-none' : 'btn-select' " class="btn-select bettwen mt-4">→</button>
          </div>
        </div>
      </div>
